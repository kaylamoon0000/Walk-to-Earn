<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Walk-to-Earn Harlem</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

  <style>
    :root {
      --bg: #f4f8fc;
      --panel: #ffffff;
      --panel-soft: #f8fbff;
      --line: #e3ebf5;
      --text: #67778d;
      --heading: #14263d;
      --navy: #13243a;
      --blue1: #7ec9ff;
      --blue2: #4494ff;
      --blue3: #255fcb;
      --green: #21b772;
      --gold: #f0b74a;
      --red: #eb5757;
      --orange: #ff8d3a;
      --purple: #8b5cf6;
      --shadow: 0 24px 60px rgba(19, 36, 58, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #fbfdff 0%, #f6faff 34%, var(--bg) 72%);
      line-height: 1.55;
      -webkit-text-size-adjust: none;
    }

    h1, h2, h3, h4 {
      margin: 0 0 0.8rem;
      color: var(--heading);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    h1 { font-size: clamp(2.3rem, 4vw, 4.2rem); font-weight: 800; }
    h2 { font-size: clamp(1.6rem, 2.3vw, 2.5rem); font-weight: 800; }
    h3 { font-size: 1.08rem; font-weight: 700; }
    h4 { font-size: 0.96rem; font-weight: 700; }
    p { margin: 0 0 1rem; font-size: 0.97rem; }

    img { display: block; max-width: 100%; }
    button, input, select { font: inherit; }

    .container {
      width: min(1400px, calc(100% - 28px));
      margin: 0 auto;
    }

    .hidden { display: none !important; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 3500;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(227, 235, 245, 0.92);
    }

    .topbar-inner {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--blue1), var(--blue3));
      box-shadow: var(--shadow);
      flex: 0 0 auto;
    }

    .brand-copy { min-width: 0; }
    .brand-title {
      color: var(--navy);
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }

    .brand-sub {
      color: #8393a6;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .user-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      background: #eef5ff;
      color: var(--navy);
      font-weight: 700;
      border: 1px solid #d8e8fb;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tab-btn {
      border: 1px solid transparent;
      background: transparent;
      color: #66768c;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .tab-btn:hover,
    .tab-btn.active {
      background: #edf5ff;
      border-color: #d6e8fb;
      color: var(--blue3);
    }

    .tab-notif {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 0 4px rgba(235, 87, 87, 0.15);
      display: none;
    }

    .tab-notif.show { display: inline-block; }

    .hero {
      color: white;
      padding: 52px 0 28px;
      background: radial-gradient(circle at top right, rgba(255,255,255,0.2), transparent 28%), linear-gradient(135deg, #7dc7ff 0%, #4b95ff 46%, #2866d6 100%);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 20px;
      align-items: stretch;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.18);
      font-weight: 700;
      margin-bottom: 14px;
    }

    .hero p {
      color: rgba(255,255,255,0.9);
      font-size: 1.03rem;
      max-width: 48rem;
    }

    .hero-preview {
      font-size: 1rem;
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      margin-bottom: 10px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .button {
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      border: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.18s ease, background 0.18s ease, opacity 0.18s ease;
      text-decoration: none;
    }

    .button:hover { transform: translateY(-1px); }
    .button.primary { background: white; color: var(--blue3); }
    .button.ghost { background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.22); }
    .button.dark { background: var(--navy); color: white; }
    .button.green { background: var(--green); color: white; }
    .button.soft { background: #edf5ff; color: var(--blue3); }
    .button.warn { background: #fff3ea; color: #c96a11; border: 1px solid #ffd8bb; }
    .button.purple { background: var(--purple); color: white; }

    .hero-panel {
      border-radius: var(--radius-xl);
      padding: 16px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 25px 70px rgba(15, 33, 56, 0.14);
    }

    .summary-shell {
      height: 100%;
      border-radius: var(--radius-lg);
      padding: 16px;
      background: white;
      color: var(--text);
    }

    .summary-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--navy);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-card {
      background: #f6f9fd;
      border-radius: 16px;
      padding: 12px;
    }

    .summary-card strong {
      display: block;
      color: var(--navy);
      font-size: 1.05rem;
      margin-bottom: 4px;
    }

    .page { padding: 18px 0 34px; }
    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
    }

    .platform-layout {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr) 350px;
      gap: 16px;
      align-items: start;
    }

    .walker-only,
    .business-only {
      display: none;
    }

    body.walker-view .walker-only,
    body.business-view .business-only {
      display: block;
    }

    .form-group + .form-group { margin-top: 14px; }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: var(--navy);
      font-weight: 700;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="container">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-mark"><i class="fa-solid fa-shoe-prints"></i></div>
          <div class="brand-copy">
            <div class="brand-title">Walk Harlem</div>
            <div class="brand-sub">AI Fitness</div>
          </div>
        </div>
        <div class="tabs">
          <button class="tab-btn active" data-target="home">Home</button>
        </div>
        <div class="topbar-right">
          <div class="user-pill">Guest</div>
        </div>
      </div>
    </div>
  </div>

  <div class="hero">
    <div class="container">
      <div class="hero-grid">
        <div class="hero-content">
          <div class="hero-badge">Harlem Exclusive</div>
          <h1>Walk to Earn</h1>
          <p>Get rewarded for every step you take in the neighborhood.</p>
          <div class="hero-actions">
            <button class="button primary login-trigger">Login</button>
            <button class="button ghost signup-trigger">Sign Up</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Login button logic
    document.querySelector('.login-trigger').addEventListener('click', () => {
      alert('Login button clicked!');
    });

    // Signup button logic
    document.querySelector('.signup-trigger').addEventListener('click', () => {
      alert('Sign Up button clicked!');
    });

    // Tab logic
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        alert('Tab changed!');
      });
    });
  </script>
</body>
</html>
