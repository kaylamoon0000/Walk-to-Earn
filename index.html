<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Walk-to-Earn Harlem</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
body{margin:0;font-family:Inter;background:#f4f8fc;color:#0f2235}
.top{display:flex;justify-content:space-between;padding:16px 24px;background:white;border-bottom:1px solid #e1e8f0}
.btn{padding:10px 16px;border-radius:12px;border:none;background:#347dff;color:white;font-weight:700;cursor:pointer}
.container{padding:20px;max-width:1300px;margin:auto}
.grid{display:grid;grid-template-columns:300px 1fr 300px;gap:16px}
.card{background:white;border-radius:20px;padding:16px;border:1px solid #e1e8f0}
#map{height:600px;border-radius:16px}
.auth{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center}
.authBox{background:white;padding:24px;border-radius:20px;width:320px}
.hidden{display:none}
</style>
</head>
<body>
<div id="auth" class="auth">
<div class="authBox">
<h2>Login</h2>
<select id="role">
<option value="walker">Walker</option>
<option value="business">Business</option>
</select>
<input placeholder="Email"><input type="password" placeholder="Password">
<button class="btn" onclick="login()">Enter</button>
</div></div>
<div class="top">
<div><strong>AI Walk-to-Earn Harlem</strong></div>
<div id="userRole">Guest</div>
</div>
<div class="container">
<div class="grid">
<div class="card">
<h3>Route Builder</h3>
<select id="theme">
<option value="food">Food</option>
<option value="arts">Arts</option>
<option value="retail">Retail</option>
</select>
<button class="btn" onclick="buildRoute()">Generate</button>
<div id="stops"></div>
</div>
<div class="card">
<h3>Map</h3>
<div id="map"></div>
</div>
<div class="card">
<h3 id="dashboardTitle">Dashboard</h3>
<div id="dashboard"></div>
</div>
</div>
</div>
<script>
let role="walker";
function login(){role=document.getElementById("role").value;document.getElementById("auth").classList.add("hidden");document.getElementById("userRole").innerText=role;renderDashboard();}
function renderDashboard(){const el=document.getElementById("dashboard");if(role==="walker"){el.innerHTML="Points: 0<br>Rewards: none"}else{el.innerHTML="Business analytics coming soon"}}
const map=L.map('map').setView([40.82155,-73.9487],18);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let routeLayer=L.layerGroup().addTo(map);
const data={food:[{n:"Cafe",lat:40.821,lng:-73.949},{n:"Bakery",lat:40.822,lng:-73.948},{n:"Deli",lat:40.8215,lng:-73.947}],arts:[{n:"Mural",lat:40.821,lng:-73.949},{n:"Gallery",lat:40.822,lng:-73.948},{n:"Books",lat:40.8215,lng:-73.947}],retail:[{n:"Shop",lat:40.821,lng:-73.949},{n:"Market",lat:40.822,lng:-73.948},{n:"Boutique",lat:40.8215,lng:-73.947}]};
function buildRoute(){routeLayer.clearLayers();let t=document.getElementById("theme").value;let pts=data[t];let coords=[[40.8209,-73.9495]];pts.sort(()=>Math.random()-0.5);pts.forEach(p=>coords.push([p.lat,p.lng]));L.polyline(coords,{dashArray:"10 10"}).addTo(routeLayer);coords.forEach(c=>L.circleMarker(c).addTo(routeLayer));document.getElementById("stops").innerHTML=pts.map(p=>p.n).join("<br>");}
buildRoute();
</script>
</body>
</html>
