<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Walk Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
header { padding:15px; background:#020617; display:flex; justify-content:space-between; }
button { padding:10px; border:none; border-radius:6px; cursor:pointer; }
.primary { background:#2563eb; color:white; }
.secondary { background:#1e293b; color:white; }

#login { max-width:400px; margin:40px auto; background:#1e293b; padding:20px; border-radius:10px; }
input { width:100%; padding:10px; margin:10px 0; }

#app { display:none; }
#map { height:70vh; }

.panel { padding:10px; background:#020617; display:flex; gap:10px; flex-wrap:wrap; }

.badge { width:10px; height:10px; background:red; border-radius:50%; display:inline-block; }
.hidden { display:none; }
</style>
</head>

<body>

<header>
<h2>AI Walk Platform</h2>
</header>

<div id="login">
<h3>Login</h3>
<input id="email" placeholder="Email (.com)">
<input id="password" type="password" placeholder="Password">
<button id="signup" class="primary">Create Account</button>
<button id="signin" class="secondary">Sign In</button>
<button id="verify" class="secondary">Send Verification</button>
<p id="status"></p>
</div>

<div id="app">
<div class="panel">
<select id="time">
<option value="10">10 min</option>
<option value="20">20 min</option>
<option value="40">40 min</option>
</select>

<select id="pace">
<option value="walk">Walk</option>
<option value="jog">Jog</option>
</select>

<button id="generate" class="primary">Generate Route</button>
<button id="businessTab">Business <span id="bNotif" class="badge hidden"></span></button>
<button id="appTab">App <span id="aNotif" class="badge hidden"></span></button>
</div>

<div id="map"></div>

<div class="panel">
<div id="leaderboard"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCaV7k31Rg-FAF63K7TOh0xMcMYJdSb-lY",
authDomain: "walk-with-harlem.firebaseapp.com",
projectId: "walk-with-harlem"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const email = document.getElementById("email");
const password = document.getElementById("password");
const status = document.getElementById("status");

document.getElementById("signup").onclick = async () => {
try {
await createUserWithEmailAndPassword(auth,email.value,password.value);
status.innerText="Account created";
} catch(e){status.innerText=e.message;}
};

document.getElementById("signin").onclick = async () => {
try {
const u = await signInWithEmailAndPassword(auth,email.value,password.value);
if(!u.user.emailVerified){status.innerText="Verify email";return;}
login.style.display="none";
appDiv.style.display="block";
} catch(e){status.innerText=e.message;}
};

document.getElementById("verify").onclick = async () => {
if(!auth.currentUser){status.innerText="Create account first";return;}
await sendEmailVerification(auth.currentUser);
status.innerText="Email sent";
};

/* MAP */
let map = L.map('map').setView([40.8116,-73.9465],16);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let routeLayer;

document.getElementById("generate").onclick = () => {
if(routeLayer) map.removeLayer(routeLayer);

const t = document.getElementById("time").value;
const p = document.getElementById("pace").value;

let scale = t*(p==="jog"?0.002:0.001);

let coords=[
[40.8116,-73.9465],
[40.812+scale,-73.945],
[40.811-scale,-73.944],
[40.8116,-73.9465]
];

routeLayer = L.polyline(coords,{color:"blue"}).addTo(map);

coords.forEach(c=>{
const m = L.circleMarker(c,{radius:6,color:"black"}).addTo(map);
m.onclick=()=>{
document.getElementById("bNotif").classList.remove("hidden");
document.getElementById("aNotif").classList.remove("hidden");
};
});
};

document.getElementById("businessTab").onclick=()=>{
document.getElementById("bNotif").classList.add("hidden");
alert("Business rewards here");
};

document.getElementById("appTab").onclick=()=>{
document.getElementById("aNotif").classList.add("hidden");
alert("App tracking here");
};

document.getElementById("leaderboard").innerHTML=
"<h3>Leaderboard</h3><p>1. Alex</p><p>2. Jamie</p>";

const appDiv = document.getElementById("app");
</script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</body>
</html>
