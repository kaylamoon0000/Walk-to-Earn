<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Walk Harlem</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
body{margin:0;font-family:Inter;background:#f4f8fc}
.hidden{display:none}
#loginOverlay{position:fixed;inset:0;background:#0006;display:flex;align-items:center;justify-content:center}
.card{background:white;padding:30px;border-radius:20px;width:400px}
button{padding:10px 15px;margin-top:10px;cursor:pointer}
#map{height:100vh}
</style>
</head>

<body>

<div id="loginOverlay">
<div class="card">
<h2>Login</h2>

<button onclick="setRole('walker')">Walker</button>
<button onclick="setRole('business')">Business</button>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="submitLogin()">Continue</button>
<p id="msg"></p>
</div>
</div>

<div id="app" class="hidden">
<button onclick="switchRole()">Switch Role</button>
<button onclick="logout()">Logout</button>
<div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// LOGIN SYSTEM
let users = JSON.parse(localStorage.getItem("users")||"{}");
let currentUserRole = "walker";

function setRole(r){ currentUserRole = r; }

function submitLogin(){
let e=email.value;
let p=password.value;

if(!e||!p){
msg.innerText="Enter info";
return;
}

if(!users[e]){
users[e]={password:p,role:currentUserRole};
localStorage.setItem("users",JSON.stringify(users));
msg.innerText="Account created";
return;
}

if(users[e].password!==p){
msg.innerText="Wrong password";
return;
}

currentUserRole=users[e].role;

loginOverlay.classList.add("hidden");
app.classList.remove("hidden");

initMap();
}

function logout(){
location.reload();
}

function switchRole(){
currentUserRole=currentUserRole==="walker"?"business":"walker";
alert("Role: "+currentUserRole);
}

// MAP
let map,walker;

function initMap(){
map=L.map('map').setView([40.821,-73.949],17);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

walker=L.circleMarker([40.821,-73.949],{
radius:8,
color:"black",
fillColor:"black",
fillOpacity:1
}).addTo(map);

runRoute();
}

// SMOOTH MOVEMENT
function runRoute(){

let path=[
[40.821,-73.949],
[40.822,-73.948],
[40.823,-73.949],
[40.822,-73.950],
[40.821,-73.949]
];

let i=0;

function next(){
if(i>=path.length-1)return;

let start=L.latLng(path[i]);
let end=L.latLng(path[i+1]);

let t=0;

function animate(){
t+=0.02;

let lat=start.lat+(end.lat-start.lat)*t;
let lng=start.lng+(end.lng-start.lng)*t;

walker.setLatLng([lat,lng]);

if(t<1){
requestAnimationFrame(animate);
}else{
i++;
next();
}
}

animate();
}

next();
}

</script>

</body>
</html>
