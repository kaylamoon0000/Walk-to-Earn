<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Walk Platform</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Inter,Arial;background:#f5f9ff;}
#map{height:70vh;}
.hidden{display:none;}

.auth{
position:fixed;
inset:0;
background:linear-gradient(135deg,#4fa3ff,#1f5ed8);
display:flex;
align-items:center;
justify-content:center;
}

.box{
background:white;
padding:30px;
border-radius:20px;
width:380px;
box-shadow:0 20px 60px rgba(0,0,0,0.2);
}

h2{margin:0 0 10px;}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#2c6cff;
color:white;
cursor:pointer;
width:100%;
margin-top:10px;
}

.tabs button{
background:#ddd;color:black;width:48%;
}
.tabs .active{background:#2c6cff;color:white;}

#top{
padding:15px;
background:white;
display:flex;
gap:10px;
align-items:center;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="auth" id="authScreen">

<div class="box">

<h2 id="title">Login (Walker)</h2>

<div class="tabs">
<button id="walker" class="active">Walker</button>
<button id="business">Business</button>
</div>

<div class="tabs">
<button id="login" class="active">Sign In</button>
<button id="signup">Create</button>
</div>

<input id="email" placeholder="Email (.com)">
<input id="pass" type="password" placeholder="Password">

<div id="extra" class="hidden">
<input id="name" placeholder="Name">
<input id="biz" placeholder="Business Name">
</div>

<button id="submit">Continue</button>

<p id="msg"></p>

</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div id="top">
<select id="time">
<option value="10">10 min</option>
<option value="20" selected>20 min</option>
<option value="40">40 min</option>
</select>

<select id="mode">
<option value="walk">Walk</option>
<option value="run">Run</option>
</select>

<button id="build">Build</button>
<button id="logout">Logout</button>

<h3 id="routeTitle">Route</h3>
</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

// FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut,
sendEmailVerification
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCaV7k31Rg-FAF63K7TOh0xMcMYJdSb-lY",
  authDomain: "walk-with-harlem.firebaseapp.com",
  projectId: "walk-with-harlem"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// STATE
let role="walker";
let mode="login";

// UI
const msg=document.getElementById("msg");

function ui(){
title.innerText=(mode==="login"?"Login":"Create")+" ("+role+")";
extra.classList.toggle("hidden",mode==="login");

walker.classList.toggle("active",role==="walker");
business.classList.toggle("active",role==="business");

login.classList.toggle("active",mode==="login");
signup.classList.toggle("active",mode==="signup");
}

// SWITCHES
walker.onclick=()=>{role="walker";ui();}
business.onclick=()=>{role="business";ui();}
login.onclick=()=>{mode="login";ui();}
signup.onclick=()=>{mode="signup";ui();}

// AUTH
submit.onclick=async()=>{

let e=email.value.trim();
let p=pass.value.trim();

if(!e.endsWith(".com")){
msg.innerText="Use .com email";
return;
}

try{

// CREATE
if(mode==="signup"){
let cred=await createUserWithEmailAndPassword(auth,e,p);

await setDoc(doc(db,role==="walker"?"walkers":"businesses",cred.user.uid),{
email:e,
role:role,
name:name.value,
business:biz.value
});

await sendEmailVerification(cred.user);

msg.innerText="Account created. Check email to verify, then sign in.";
mode="login";
ui();
return;
}

// LOGIN
let cred=await signInWithEmailAndPassword(auth,e,p);

if(!cred.user.emailVerified){
msg.innerText="Verify email first.";
return;
}

// detect role
let w=await getDoc(doc(db,"walkers",cred.user.uid));
let b=await getDoc(doc(db,"businesses",cred.user.uid));

if(w.exists()) role="walker";
if(b.exists()) role="business";

authScreen.classList.add("hidden");
app.classList.remove("hidden");

}catch(err){
msg.innerText=err.message;
}

};

// LOGOUT
logout.onclick=()=>{signOut(auth);location.reload();}

// MAP
let map=L.map('map').setView([40.821,-73.949],18);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let route;

// ROUTE
function gen(t,m){
let s=t/10;
if(m==="run")s*=1.5;

return [
[40.821,-73.949],
[40.821+0.0003*s,-73.949+0.0006*s],
[40.821+0.0008*s,-73.949+0.0012*s],
[40.821,-73.949]
];
}

// BUILD
build.onclick=()=>{
let t=time.value;
let m=mode.value;

let pts=gen(t,m);

if(route)map.removeLayer(route);

route=L.polyline(pts,{color:"blue"}).addTo(map);

routeTitle.innerText=`${t} min ${m} route`;

map.fitBounds(route.getBounds());
};

// AUTO LOGIN
onAuthStateChanged(auth,user=>{
if(user && user.emailVerified){
authScreen.classList.add("hidden");
app.classList.remove("hidden");
}
});

ui();

</script>

</body>
</html>
