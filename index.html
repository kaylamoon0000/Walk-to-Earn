<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Walk</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Inter, system-ui;
background:#f4f7fb;
}

/* LOGIN */
#authScreen{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#4f8cff,#1e40af);
}

.card{
background:white;
padding:30px;
border-radius:20px;
width:420px;
box-shadow:0 20px 60px rgba(0,0,0,0.2);
}

h2{margin-bottom:10px;}

.tabs{display:flex;gap:10px;margin-bottom:12px;}

.tabs button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#e5e7eb;
cursor:pointer;
font-weight:500;
}

.tabs .active{
background:#2563eb;
color:white;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

.mainBtn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

#msg{
margin-top:10px;
color:#dc2626;
font-size:14px;
}

/* APP */
#app{display:none;}

#top{
background:white;
padding:15px;
display:flex;
gap:10px;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

#map{
height:75vh;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authScreen">
<div class="card">

<h2 id="title">Login (Walker)</h2>

<div class="tabs">
<button id="walkerBtn" class="active">Walker</button>
<button id="businessBtn">Business</button>
</div>

<div class="tabs">
<button id="loginTab" class="active">Sign In</button>
<button id="signupTab">Create</button>
</div>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<div id="extra" style="display:none;">
<input id="name" placeholder="Name">
<input id="biz" placeholder="Business Name">
</div>

<button class="mainBtn" id="submit">Continue</button>
<p id="msg"></p>

</div>
</div>

<!-- APP -->
<div id="app">

<div id="top">
<select id="time">
<option value="10">10 min</option>
<option value="20">20 min</option>
<option value="40">40 min</option>
</select>

<select id="mode">
<option value="walk">Walk</option>
<option value="run">Run</option>
</select>

<button id="build">Build</button>
<button id="logout">Logout</button>

<h3 id="routeTitle">Route</h3>
</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// STATE
let role="walker";
let mode="login";

const msg=document.getElementById("msg");

// UI update
function updateUI(){
title.innerText=(mode==="login"?"Login":"Create")+" ("+role+")";
extra.style.display=mode==="signup"?"block":"none";

walkerBtn.classList.toggle("active",role==="walker");
businessBtn.classList.toggle("active",role==="business");

loginTab.classList.toggle("active",mode==="login");
signupTab.classList.toggle("active",mode==="signup");
}

// TOGGLES
walkerBtn.onclick=()=>{role="walker";updateUI();}
businessBtn.onclick=()=>{role="business";updateUI();}
loginTab.onclick=()=>{mode="login";updateUI();}
signupTab.onclick=()=>{mode="signup";updateUI();}

// SIMPLE LOCAL LOGIN (NO BACKEND)
submit.onclick=()=>{

let e=email.value.trim();
let p=password.value.trim();

if(!e || !p){
msg.innerText="Enter email + password";
return;
}

let users = JSON.parse(localStorage.getItem("users") || "{}");

// SIGNUP
if(mode==="signup"){
users[e] = {
password:p,
role:role,
name:name.value,
business:biz.value
};

localStorage.setItem("users",JSON.stringify(users));

msg.innerText="Account created. Sign in.";
mode="login";
updateUI();
return;
}

// LOGIN
if(!users[e] || users[e].password !== p){
msg.innerText="Invalid login";
return;
}

role = users[e].role;

authScreen.style.display="none";
app.style.display="block";

};

// LOGOUT
logout.onclick=()=>{
location.reload();
};

// MAP
let map=L.map('map').setView([40.821,-73.949],17);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let route;

// BETTER ROUTES
function generate(t,m){
let s=t/10;
if(m==="run") s*=1.6;

return [
[40.821,-73.949],
[40.821+0.0003*s,-73.949+0.0005*s],
[40.821+0.0007*s,-73.949+0.0002*s],
[40.821+0.0004*s,-73.949-0.0004*s],
[40.821,-73.949]
];
}

build.onclick=()=>{
let t=time.value;
let m=mode.value;

let pts=generate(t,m);

if(route) map.removeLayer(route);

route=L.polyline(pts,{color:"#2563eb",weight:5}).addTo(map);

routeTitle.innerText=`${t} minute ${m} route`;

map.fitBounds(route.getBounds());
};

updateUI();

</script>

</body>
</html>
