<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Walk</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Inter, Arial;
background:#f4f7fb;
}

/* LOGIN */
#authScreen{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#4f8cff,#1e4ed8);
}

.card{
background:white;
padding:28px;
border-radius:16px;
width:360px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h2{margin-bottom:10px;}

.tabs{
display:flex;
gap:8px;
margin-bottom:10px;
}

.tabs button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
background:#e5e7eb;
cursor:pointer;
}

.tabs .active{
background:#2563eb;
color:white;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:1px solid #ddd;
}

.mainBtn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

#msg{
margin-top:10px;
color:red;
}

/* APP */
#app{display:none;}

#top{
background:white;
padding:15px;
display:flex;
gap:10px;
align-items:center;
}

#map{
height:75vh;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authScreen">
<div class="card">

<h2 id="title">Login (Walker)</h2>

<div class="tabs">
<button id="walkerBtn" class="active">Walker</button>
<button id="businessBtn">Business</button>
</div>

<div class="tabs">
<button id="loginTab" class="active">Sign In</button>
<button id="signupTab">Create</button>
</div>

<input id="email" placeholder="Email (.com)">
<input id="password" type="password" placeholder="Password">

<div id="extra" style="display:none;">
<input id="name" placeholder="Name">
<input id="biz" placeholder="Business Name">
</div>

<button class="mainBtn" id="submit">Continue</button>

<p id="msg"></p>

</div>
</div>

<!-- APP -->
<div id="app">

<div id="top">
<select id="time">
<option value="10">10 min</option>
<option value="20" selected>20 min</option>
<option value="40">40 min</option>
</select>

<select id="mode">
<option value="walk">Walk</option>
<option value="run">Run</option>
</select>

<button id="build">Build</button>
<button id="logout">Logout</button>

<h3 id="routeTitle">Route</h3>
</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCaV7k31Rg-FAF63K7TOh0xMcMYJdSb-lY",
  authDomain: "walk-with-harlem.firebaseapp.com",
  projectId: "walk-with-harlem"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

// STATE
let role = "walker";
let mode = "login";

// UI
const msg = document.getElementById("msg");

function updateUI(){
title.innerText = (mode==="login"?"Login":"Create")+" ("+role+")";
extra.style.display = mode==="signup" ? "block" : "none";

walkerBtn.classList.toggle("active",role==="walker");
businessBtn.classList.toggle("active",role==="business");

loginTab.classList.toggle("active",mode==="login");
signupTab.classList.toggle("active",mode==="signup");
}

// SWITCHES
walkerBtn.onclick=()=>{role="walker";updateUI();}
businessBtn.onclick=()=>{role="business";updateUI();}
loginTab.onclick=()=>{mode="login";updateUI();}
signupTab.onclick=()=>{mode="signup";updateUI();}

// AUTH
submit.onclick = async () => {

let e=email.value.trim();
let p=password.value.trim();

if(!e.endsWith(".com")){
msg.innerText="Use .com email";
return;
}

try{

if(mode==="signup"){
let cred = await createUserWithEmailAndPassword(auth,e,p);

await setDoc(doc(db, role==="walker"?"walkers":"businesses", cred.user.uid),{
email:e,
role:role,
name:name.value,
business:biz.value
});

msg.innerText="Account created. Now sign in.";
mode="login";
updateUI();
return;
}

let cred = await signInWithEmailAndPassword(auth,e,p);

let w = await getDoc(doc(db,"walkers",cred.user.uid));
let b = await getDoc(doc(db,"businesses",cred.user.uid));

if(w.exists()) role="walker";
if(b.exists()) role="business";

authScreen.style.display="none";
app.style.display="block";

}catch(err){
msg.innerText=err.message;
}

};

// LOGOUT
logout.onclick=()=>{signOut(auth);location.reload();}

// MAP
let map = L.map('map').setView([40.821,-73.949],18);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let route;

function generate(t,m){
let s=t/10;
if(m==="run") s*=1.5;

return [
[40.821,-73.949],
[40.821+0.0004*s,-73.949+0.0006*s],
[40.821+0.0008*s,-73.949+0.0012*s],
[40.821,-73.949]
];
}

build.onclick=()=>{
let t=time.value;
let m=mode.value;

let pts=generate(t,m);

if(route) map.removeLayer(route);

route = L.polyline(pts,{color:"#2563eb",weight:5}).addTo(map);

routeTitle.innerText = `${t} min ${m} route`;

map.fitBounds(route.getBounds());
};

// AUTO LOGIN
onAuthStateChanged(auth,user=>{
if(user){
authScreen.style.display="none";
app.style.display="block";
}
});

updateUI();

</script>

</body>
</html>
