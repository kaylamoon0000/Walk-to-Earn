<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Walk Platform</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#f4f7fb;}
#map{height:70vh;}
.panel{padding:20px;}
.hidden{display:none;}

button{
padding:10px 15px;
margin:5px;
cursor:pointer;
border-radius:8px;
border:none;
background:#2c6cff;
color:white;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
}

.auth-box{
max-width:400px;
margin:100px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.tabs button{
background:#ddd;
color:black;
}

.tabs .active{
background:#2c6cff;
color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="auth-box">

<h2 id="authTitle">Login (Walker)</h2>

<div class="tabs">
<button id="walkerBtn" class="active">Walker</button>
<button id="businessBtn">Business</button>
</div>

<div class="tabs">
<button id="loginTab" class="active">Sign In</button>
<button id="signupTab">Create</button>
</div>

<input id="email" placeholder="Email (.com only)">
<input id="password" type="password" placeholder="Password">

<div id="extraFields" class="hidden">
<input id="name" placeholder="Name">
<input id="bizName" placeholder="Business Name">
</div>

<button id="authBtn">Continue</button>
<p id="status"></p>

</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="panel">
<h2 id="title">Route Builder</h2>

<select id="time">
<option value="10">10 min</option>
<option value="20" selected>20 min</option>
<option value="40">40 min</option>
</select>

<select id="mode">
<option value="walk">Walk</option>
<option value="run">Run</option>
</select>

<button id="build">Build Route</button>
<button id="start">Start</button>
<button id="logout">Logout</button>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

// FIREBASE IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCaV7k31Rg-FAF63K7TOh0xMcMYJdSb-lY",
  authDomain: "walk-with-harlem.firebaseapp.com",
  projectId: "walk-with-harlem",
  storageBucket: "walk-with-harlem.firebasestorage.app",
  messagingSenderId: "29626188705",
  appId: "1:29626188705:web:2a3230691b372cf5cb01e0"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

// STATE
let role = "walker";
let modeAuth = "login";

// UI ELEMENTS
const walkerBtn = document.getElementById("walkerBtn");
const businessBtn = document.getElementById("businessBtn");
const loginTab = document.getElementById("loginTab");
const signupTab = document.getElementById("signupTab");
const extraFields = document.getElementById("extraFields");
const authTitle = document.getElementById("authTitle");
const status = document.getElementById("status");

// SWITCH ROLE
walkerBtn.onclick = ()=>{role="walker";updateUI();}
businessBtn.onclick = ()=>{role="business";updateUI();}

// SWITCH MODE
loginTab.onclick = ()=>{modeAuth="login";updateUI();}
signupTab.onclick = ()=>{modeAuth="signup";updateUI();}

// UPDATE UI
function updateUI(){
authTitle.innerText = `${modeAuth==="login"?"Login":"Create"} (${role})`;

walkerBtn.classList.toggle("active",role==="walker");
businessBtn.classList.toggle("active",role==="business");

loginTab.classList.toggle("active",modeAuth==="login");
signupTab.classList.toggle("active",modeAuth==="signup");

extraFields.classList.toggle("hidden",modeAuth==="login");
}

// AUTH BUTTON
document.getElementById("authBtn").onclick = async ()=>{

let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();

if(!email.endsWith(".com")){
status.innerText="Must use .com email";
return;
}

try{

// CREATE ACCOUNT
if(modeAuth==="signup"){
let userCred = await createUserWithEmailAndPassword(auth,email,password);

await setDoc(doc(db, role==="walker"?"walkers":"businesses", userCred.user.uid),{
email:email,
role:role,
name:document.getElementById("name").value,
business:document.getElementById("bizName").value
});

status.innerText="Account created. Now sign in.";
modeAuth="login";
updateUI();
return;
}

// LOGIN
let userCred = await signInWithEmailAndPassword(auth,email,password);

// DETECT ROLE
let w = await getDoc(doc(db,"walkers",userCred.user.uid));
let b = await getDoc(doc(db,"businesses",userCred.user.uid));

if(w.exists()) role="walker";
if(b.exists()) role="business";

// ENTER APP
document.getElementById("loginScreen").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

}catch(e){
status.innerText=e.message;
}

};

// LOGOUT
document.getElementById("logout").onclick = ()=>{
signOut(auth);
location.reload();
};

// MAP
let map = L.map('map').setView([40.821,-73.949],18);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let line;

// ROUTE GENERATION
function generateRoute(time,mode){

let scale = time/10;

if(mode==="run") scale *= 1.5;

return [
[40.821,-73.949],
[40.821+0.0003*scale,-73.949+0.0006*scale],
[40.821+0.0007*scale,-73.949+0.001*scale],
[40.821,-73.949]
];
}

// BUILD ROUTE
document.getElementById("build").onclick = ()=>{
let t = document.getElementById("time").value;
let m = document.getElementById("mode").value;

let coords = generateRoute(t,m);

if(line) map.removeLayer(line);

line = L.polyline(coords,{color:"blue"}).addTo(map);

document.getElementById("title").innerText = `${t} min ${m} route`;

map.fitBounds(line.getBounds());
};

// START
document.getElementById("start").onclick = ()=>{
alert("Session started");
};

// AUTO LOGIN CHECK
onAuthStateChanged(auth,user=>{
if(user){
document.getElementById("loginScreen").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
}
});

updateUI();

</script>

</body>
</html>
